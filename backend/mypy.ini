# Mypy Configuration for diving-school-sync
# SQLAlchemy ORM returns Column[T] types at runtime, but these are
# semantically equivalent to T in business logic.

[mypy]
ignore_missing_imports = True
disallow_untyped_defs = False
check_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
warn_unused_ignores = True
show_error_codes = True

# Disable specific known-spurious error codes
disable_error_code = no-redef, assignment, arg-type, name-defined, attr-defined

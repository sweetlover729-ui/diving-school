[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "e2e: end-to-end full flow tests",
    "security: security boundary tests",
]

[tool.ruff]
# ========================
# Ruff Linter Configuration
# ========================
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "W"]
ignore = [
    "F403",   # star import — shared.py 合法导出，架构决策
    "F405",   # may be undefined — 实为 shared.py 导出的 52 个合法名称
    "E501",   # line too long — 强制 120 会影响可读性
    "E712",   # == True/False — 有意为之的显式布尔比较
    "W291",   # trailing whitespace
    "W293",   # blank line contains whitespace
    "E402",   # module level import not at top — 条件导入是架构决策
    # F841 保留（不禁用）：unused variable 是真实 bug，需手动修复
    #   - admin_classes.py:466 'result' unused
    #   - documents.py:1209 'due_date' unused
    "E741",   # ambiguous variable name 'l' — 变量名 l 是循环惯用法
    "E711",   # comparison to None — 显式 is None 是有意的
]
per-file-ignores = {
    "app/api/admin/shared.py" = [],
}

[tool.ruff.lint.isort]
known-first-party = ["app"]

# ========================
# Mypy Configuration
# ========================
# SQLAlchemy ORM returns Column[T] types at runtime, but these are
# semantically equivalent to T in business logic. The following
# configuration suppresses known spurious patterns.
[tool.mypy]
ignore_missing_imports = true
disallow_untyped_defs = false
check_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
warn_unused_ignores = true
show_error_codes = true

# Disable specific known-spurious error codes for SQLAlchemy + Pydantic codebases
disable_error_code = [
    "no-redef",       # SQLAlchemy declarative inheritance causes intentional redefinition
    "assignment",    # None assignment to typed variables in optional fields
    "arg-type",       # Column[T] vs T — runtime semantically equivalent, fix is invasive
    "name-defined",   # Cascading from Column[T] inference failures
    "attr-defined",   # __getattr__ patterns used by SQLAlchemy models
]

